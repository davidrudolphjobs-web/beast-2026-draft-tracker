<style>
  :root, html[data-theme="dark"] {
    --bg: #0f1115;
    --panel: #181b22;
    --panel-2: #1f232c;
    --border: #2a2f3a;
    --text: #e8ebf0;
    --text-dim: #9aa3b2;
    --accent: #4f8eff;
    --danger: #ef4444;
    --success: #22c55e;
    --header-bg: rgba(15, 17, 21, 0.92);
    --modal-body: #ffffff;
    --modal-body-text: #111111;
    --modal-athletic-bg: #f7f8fa;
    --modal-athletic-text: #1f2328;
    --modal-athletic-border: #e0e3ea;
    --filled-bg: #1a3b1e;
    --filled-border: #2d6a30;
    --filled-text: #a7f3a8;
    --placeholder: #4a5161;
    --kbd-bg: var(--panel);

    --c-QB: #FCA5A5; --c-RB: #FDBA74; --c-WR: #93C5FD; --c-TE: #C4B5FD;
    --c-OT: #86EFAC; --c-G: #6EE7B7;  --c-C: #5EEAD4;  --c-EDGE: #F9A8D4;
    --c-DT: #FCD34D; --c-LB: #FDE68A; --c-CB: #A5F3FC; --c-S: #D8B4FE;
  }
  html[data-theme="light"] {
    --bg: #f6f7fa;
    --panel: #ffffff;
    --panel-2: #eef0f5;
    --border: #dfe2ea;
    --text: #1a1f2a;
    --text-dim: #5b6473;
    --accent: #2563eb;
    --danger: #dc2626;
    --success: #16a34a;
    --header-bg: rgba(246, 247, 250, 0.92);
    --modal-body: #ffffff;
    --modal-body-text: #111111;
    --modal-athletic-bg: #f4f5f8;
    --modal-athletic-text: #1f2328;
    --modal-athletic-border: #e0e3ea;
    --filled-bg: #dcfce7;
    --filled-border: #16a34a;
    --filled-text: #14532d;
    --placeholder: #9aa3b2;
    --kbd-bg: #f0f2f7;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
    font-size: 14px;
    -webkit-font-smoothing: antialiased;
  }
  header {
    position: sticky; top: 0; z-index: 10;
    background: var(--header-bg);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
  }
  .title-row {
    display: flex; align-items: baseline; justify-content: space-between; gap: 16px; flex-wrap: wrap;
  }
  h1 {
    margin: 0; font-size: 20px; font-weight: 800; letter-spacing: -0.01em;
  }
  .subtitle { color: var(--text-dim); font-size: 12px; }
  .stats {
    display: flex; gap: 16px; align-items: center; font-size: 12px;
    color: var(--text-dim);
  }
  .stats strong { color: var(--text); font-size: 14px; font-weight: 700; }

  .toolbar {
    display: flex; gap: 8px; align-items: center; margin-top: 10px; flex-wrap: wrap;
  }
  .tabs { display: flex; gap: 4px; flex-wrap: wrap; }
  .tab {
    background: var(--panel); border: 1px solid var(--border); color: var(--text-dim);
    padding: 5px 10px; border-radius: 6px; font-size: 12px; cursor: pointer;
    font-weight: 600; user-select: none; position: relative; overflow: hidden;
  }
  .tab:hover { color: var(--text); }
  .tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .tab .tab-count { opacity: 0.7; margin-left: 4px; font-weight: 500; }
  .tab.active .tab-count { opacity: 0.9; }
  .tab.pos-tab::before {
    content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    background: var(--pos-color, transparent);
  }

  .filter-chk {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--panel); border: 1px solid var(--border);
    padding: 5px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; user-select: none;
  }
  .filter-chk input { accent-color: var(--accent); }
  .filter-chk:has(input:checked) { background: var(--accent); border-color: var(--accent); color: #fff; }

  button.btn {
    background: var(--panel); border: 1px solid var(--border); color: var(--text);
    padding: 5px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; font-weight: 600;
  }
  button.btn:hover { background: var(--panel-2); }
  button.btn.danger:hover { background: var(--danger); color: #fff; border-color: var(--danger); }

  main { padding: 16px 20px 40px; max-width: 1280px; margin: 0 auto; }

  table {
    width: 100%; border-collapse: separate; border-spacing: 0;
    font-size: 13px;
  }
  th, td {
    padding: 6px 8px; text-align: left; border-bottom: 1px solid var(--border); vertical-align: middle;
  }
  th {
    position: sticky; top: var(--header-h, 92px); background: var(--bg); z-index: 5;
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-dim);
    padding: 8px; font-weight: 700;
    box-shadow: 0 1px 0 0 var(--border);
  }
  tr.row { transition: opacity 0.15s; }
  tr.row.drafted { opacity: 0.45; }
  tr.row.drafted .name, tr.row.drafted .school {
    text-decoration: line-through;
    text-decoration-thickness: 1.5px;
  }

  td.rank {
    font-variant-numeric: tabular-nums; font-weight: 700; color: var(--text-dim);
    width: 36px; text-align: right; padding-right: 10px;
  }
  td.name { font-weight: 700; letter-spacing: -0.005em; }
  td.name .link {
    cursor: pointer; color: var(--text); border-bottom: 1px dotted transparent;
    display: inline-flex; align-items: center; gap: 10px;
  }
  td.name .link { text-decoration: none; }
  td.name .link:hover { border-bottom-color: var(--accent); color: var(--accent); }
  td.name .ext-icon { color: var(--text-dim); font-weight: 400; font-size: 11px; margin-left: 2px; opacity: 0.7; }
  td.name .link:hover .ext-icon { color: var(--accent); opacity: 1; }
  td.name .avatar {
    width: 38px; height: 38px; border-radius: 50%; object-fit: cover;
    background: var(--panel); border: 1px solid var(--border);
    flex-shrink: 0;
  }
  td.name .name-stack {
    display: flex; flex-direction: column; gap: 1px; min-width: 0;
  }
  td.name .tagline {
    font-size: 11px; font-weight: 400; color: var(--text-dim);
    text-transform: none; letter-spacing: 0; line-height: 1.25;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    max-width: 480px;
  }
  td.ht, td.wt, td.yd40, th.ht-col, th.wt-col, th.yd40-col {
    font-variant-numeric: tabular-nums; font-size: 12px;
    text-align: center; white-space: nowrap;
  }
  td.ht, td.wt, td.yd40 { color: var(--text-dim); }
  td.ht { width: 62px; } th.ht-col { width: 62px; }
  td.wt { width: 42px; } th.wt-col { width: 42px; }
  td.yd40 { width: 46px; } th.yd40-col { width: 46px; }
  td.yd40.dnp { opacity: 0.4; }
  td.pos { width: 60px; }
  .pos-chip {
    display: inline-block; padding: 2px 6px; border-radius: 3px;
    font-size: 11px; font-weight: 700; color: #0a0d12;
  }
  td.school { color: var(--text-dim); font-size: 12px; }
  td.team-cell, td.pick-cell { width: 100px; }
  td.pick-cell { width: 70px; }
  input.field {
    background: var(--panel); border: 1px solid var(--border); color: var(--text);
    padding: 4px 8px; border-radius: 4px; font-size: 13px; font-weight: 600;
    width: 100%; font-family: inherit;
    text-transform: uppercase;
  }
  input.field.pick { text-transform: none; text-align: center; font-variant-numeric: tabular-nums; }
  input.field:focus { outline: 2px solid var(--accent); outline-offset: -1px; border-color: var(--accent); }
  input.field.filled { background: var(--filled-bg); border-color: var(--filled-border); color: var(--filled-text); }
  input.field::placeholder { color: var(--placeholder); opacity: 1; }

  /* Group view */
  .group-header {
    background: var(--panel); padding: 10px 12px; margin-top: 18px; margin-bottom: 0;
    border: 1px solid var(--border); border-bottom: none; border-radius: 8px 8px 0 0;
    display: flex; align-items: center; gap: 10px;
  }
  .group-header .chip {
    padding: 3px 10px; border-radius: 4px; font-weight: 800; font-size: 13px; color: #0a0d12;
  }
  .group-header .group-title { font-weight: 700; font-size: 15px; }
  .group-header .group-sub { color: var(--text-dim); font-size: 12px; margin-left: auto; }
  .group-table { border: 1px solid var(--border); border-radius: 0 0 8px 8px; overflow: hidden; }

  .empty-state {
    text-align: center; color: var(--text-dim); padding: 60px 20px;
    font-size: 14px;
  }

  .key-hints {
    font-size: 11px; color: var(--text-dim); margin-top: 6px;
  }
  .key-hints kbd {
    background: var(--kbd-bg); border: 1px solid var(--border); padding: 1px 5px;
    border-radius: 3px; font-size: 10px; font-family: "SF Mono", Menlo, monospace;
  }

  @media (max-width: 720px) {
    main { padding: 10px; }
    td.school { display: none; }
    th.school-col { display: none; }
    input.field { font-size: 16px; } /* prevent iOS zoom */
    .stats { display: none; }
  }
</style>
</head>

<header>
  <div class="title-row">
    <div>
      <h1>The Beast 2026 — Draft Tracker</h1>
      <div class="subtitle">Top 100 prospects · click a name to open the player's profile on The Athletic · fill Team + Pick # as picks happen</div>

  <div class="toolbar">

  <div class="key-hints">

    <span id="save-status" style="margin-left:6px;">no picks yet</span> ·
    <span style="color: var(--text-dim);">save a backup between draft days</span>
  </div>
</header>

<main id="main"></main>

const POS_NAMES = {
  QB:"Quarterbacks", RB:"Running Backs", WR:"Wide Receivers", TE:"Tight Ends",
  OT:"Offensive Tackles", G:"Guards", C:"Centers", EDGE:"Edge Defenders",
  DT:"Defensive Tackles", LB:"Linebackers", CB:"Cornerbacks", S:"Safeties"
};
const POS_ORDER = ["QB","RB","WR","TE","OT","G","C","EDGE","DT","LB","CB","S"];

function posGroup(code) { return code.match(/^[A-Z]+/)[0]; }

// --- state ---
const STORAGE_KEY = "beast2026_draft_picks_v1";
const SAVED_AT_KEY = "beast2026_saved_at_v1";
let picks = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
// Merge locked-in defaults (Day 1 picks) for any rank that has no stored pick
if (typeof DEFAULT_PICKS === "object") {
  for (const rank in DEFAULT_PICKS) {
    const cur = picks[rank];
    if (!cur || (!cur.team && !cur.pick)) {
      picks[rank] = {...DEFAULT_PICKS[rank]};
    }
  }
}
let lastSavedAt = parseInt(localStorage.getItem(SAVED_AT_KEY) || "0", 10);
// { "26": { team: "LV", pick: "1" }, ... }
let currentView = "all"; // "all" or pos group
let hideDrafted = false;

function isDrafted(p) {
  if (!p) return false;
  return !!(p.team || "").trim() && !!String(p.pick || "").trim();
}

function savePicks() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(picks));
  lastSavedAt = Date.now();
  localStorage.setItem(SAVED_AT_KEY, String(lastSavedAt));
  updateSaveStatus();
}

function relTime(ts) {
  if (!ts) return "never";
  const s = Math.floor((Date.now() - ts) / 1000);
  if (s < 5) return "just now";
  if (s < 60) return `${s}s ago`;
  const m = Math.floor(s / 60);
  if (m < 60) return `${m}m ago`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h ago`;
  return new Date(ts).toLocaleString();
}

function updateSaveStatus() {
  const el = document.getElementById("save-status");
  if (!el) return;
  const d = draftedCount();
  if (d === 0 && !lastSavedAt) { el.textContent = "no picks yet"; return; }
  el.textContent = `${d} pick${d===1?"":"s"} · saved ${relTime(lastSavedAt)}`;
}
setInterval(updateSaveStatus, 30000);

function draftedCount() {
  return Object.values(picks).filter(isDrafted).length;
}

function updateStats() {
  const d = draftedCount();
  document.getElementById("stat-drafted").textContent = d;
  document.getElementById("stat-remaining").textContent = 100 - d;
  // update tab counts
  document.querySelectorAll(".tab").forEach(t => {
    const c = t.dataset.view;
    const countEl = t.querySelector(".tab-count");
    if (c === "all") {
      countEl.textContent = `(${d}/100)`;
    } else {
      const pool = PLAYERS.filter(p => posGroup(p[2]) === c);
      const picked = pool.filter(p => isDrafted(picks[p[0]])).length;
      countEl.textContent = `(${picked}/${pool.length})`;
    }
  });
}

// --- render ---
function renderTabs() {
  const el = document.getElementById("tabs");
  const all = `<div class="tab active" data-view="all">All <span class="tab-count">(0/100)</span></div>`;
  const byPos = POS_ORDER.map(p =>
    `<div class="tab pos-tab" data-view="${p}" style="--pos-color: var(--c-${p}); padding-left: 13px;">${p} <span class="tab-count">(0/0)</span></div>`
  ).join("");
  el.innerHTML = all + byPos;
  el.querySelectorAll(".tab").forEach(t => {
    t.addEventListener("click", () => {
      document.querySelectorAll(".tab").forEach(x => x.classList.remove("active"));
      t.classList.add("active");
      currentView = t.dataset.view;
      renderMain();
    });
  });
}

function rowHtml(player) {
  const [rank, name, code, school] = player;
  const grp = posGroup(code);
  const p = picks[rank] || {};
  const team = (p.team || "").toUpperCase();
  const pick = p.pick || "";
  const drafted = isDrafted(p);
  const a = ATHLETIC[rank] || {};
  const safeImg = a.img ? a.img.replace(/&/g, "%26") : "";
  const avatar = safeImg
    ? `<img class="avatar" src="${safeImg}" alt="" loading="lazy" onerror="this.style.visibility='hidden'">`
    : `<div class="avatar"></div>`;
  const tl = a.tl ? `<div class="tagline">${a.tl}</div>` : "";
  const href = a.url || "#";
  const m = MEASURABLES[rank] || ["", "", ""];
  const [ht, wt, yd40] = m;
  return `
    <tr class="row ${drafted ? 'drafted' : ''}" data-rank="${rank}">
      <td class="rank">${rank}</td>
      <td class="name">
        <a class="link" href="${href}" target="_blank" rel="noopener">
          ${avatar}
          <span class="name-stack"><span>${name} <span class="ext-icon">↗</span></span>${tl}</span>
        </a>
      </td>
      <td class="ht">${ht}</td>
      <td class="wt">${wt}</td>
      <td class="yd40 ${yd40 === 'DNP' ? 'dnp' : ''}">${yd40 || ''}</td>
      <td class="school">${school}</td>
      <td class="pos"><span class="pos-chip" style="background:var(--c-${grp})">${code}</span></td>
      <td class="team-cell">
        <input class="field team ${drafted ? 'filled' : ''}" type="text"
               maxlength="5" value="${team}"
               data-rank="${rank}" data-field="team" />
      </td>
      <td class="pick-cell">
        <input class="field pick ${pick ? 'filled' : ''}" type="text" inputmode="numeric"
               maxlength="4" value="${pick}"
               data-rank="${rank}" data-field="pick" />
      </td>
    </tr>`;
}

function renderMain() {
  const main = document.getElementById("main");
  let html = "";
  let players;
  if (currentView === "all") {
    players = PLAYERS.slice();
  } else {
    players = PLAYERS.filter(p => posGroup(p[2]) === currentView);
  }
  if (hideDrafted) {
    players = players.filter(p => !isDrafted(picks[p[0]]));
  }
  if (players.length === 0) {
    main.innerHTML = `<div class="empty-state">No players match this filter.</div>`;
    return;
  }
  html += `
    <table>
      <thead><tr>
        <th class="rank-col">#</th>
        <th>Prospect</th>
        <th class="ht-col">HT</th>
        <th class="wt-col">WT</th>
        <th class="yd40-col">40</th>
        <th class="school-col">School</th>
        <th>Pos</th>
        <th>Team</th>
        <th>Pick #</th>
      </tr></thead>
      <tbody>
        ${players.map(rowHtml).join("")}
      </tbody>
    </table>
  `;
  main.innerHTML = html;
  wireInputs();
}

function wireInputs() {
  document.querySelectorAll("input.field").forEach(inp => {
    inp.addEventListener("input", e => {
      const rank = parseInt(e.target.dataset.rank, 10);
      const field = e.target.dataset.field;
      picks[rank] = picks[rank] || {};
      let v = e.target.value;
      if (field === "team") v = v.toUpperCase();
      if (field === "pick") v = v.replace(/[^0-9]/g, "");
      picks[rank][field] = v;
      e.target.value = v;
      savePicks();
      // update row class live
      const tr = e.target.closest("tr");
      const drafted = isDrafted(picks[rank]);
      tr.classList.toggle("drafted", drafted);
      // filled class on inputs (each field lights up individually)
      tr.querySelector(".team").classList.toggle("filled", !!(picks[rank].team||"").trim());
      tr.querySelector(".pick").classList.toggle("filled", !!String(picks[rank].pick||"").trim());
      updateStats();
      // if hideDrafted is on and row just got drafted, re-render after blur
    });
    inp.addEventListener("blur", (e) => {
      if (!hideDrafted) return;
      const rank = parseInt(e.target.dataset.rank, 10);
      if (isDrafted(picks[rank])) renderMain();
    });
  });
}


// --- export ---
document.getElementById("export-btn").addEventListener("click", () => {
  let csv = "Rank,Name,Position,School,Team,Pick\n";
  PLAYERS.forEach(p => {
    const pk = picks[p[0]] || {};
    const row = [p[0], p[1], p[2], p[3], pk.team||"", pk.pick||""]
      .map(v => `"${String(v).replace(/"/g,'""')}"`).join(",");
    csv += row + "\n";
  });
  const blob = new Blob([csv], {type: "text/csv"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  const today = new Date().toISOString().slice(0,10);
  a.download = `beast2026_draft_picks_${today}.csv`;
  a.click();
  URL.revokeObjectURL(a.href);
});

document.getElementById("reset-btn").addEventListener("click", () => {
  if (!confirm("Clear all drafted picks? This can't be undone.")) return;
  picks = {};
  savePicks();
  renderMain();
  updateStats();
});

// --- Backup (JSON) ---
document.getElementById("backup-btn").addEventListener("click", () => {
  const payload = {
    app: "beast2026_draft_tracker",
    version: 1,
    saved_at: new Date().toISOString(),
    picks: picks,
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type: "application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  const stamp = new Date().toISOString().slice(0,16).replace(":","-").replace("T","_");
  a.download = `beast2026_draft_backup_${stamp}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
});

// --- Restore (JSON) ---
document.getElementById("restore-btn").addEventListener("click", () => {
  document.getElementById("restore-file").click();
});
document.getElementById("restore-file").addEventListener("change", async e => {
  const file = e.target.files[0];
  if (!file) return;
  try {
    const text = await file.text();
    const data = JSON.parse(text);
    const incoming = data.picks || data; // accept raw picks object too
    if (typeof incoming !== "object" || Array.isArray(incoming)) throw new Error("bad format");
    const incCount = Object.values(incoming).filter(isDrafted).length;
    if (!confirm(`Restore ${incCount} picks from this file? This overwrites your current state.`)) {
      e.target.value = ""; return;
    }
    picks = incoming;
    savePicks();
    renderMain();
    updateStats();
    alert(`Restored ${incCount} picks.`);
  } catch (err) {
    alert("Couldn't read that file: " + err.message);
  }
  e.target.value = "";
});

document.getElementById("hide-drafted").addEventListener("change", e => {
  hideDrafted = e.target.checked;
  renderMain();
});

// --- sticky header offset ---
function updateHeaderHeight() {
  const h = document.querySelector("header").offsetHeight;
  document.documentElement.style.setProperty("--header-h", h + "px");
}
window.addEventListener("load", updateHeaderHeight);
window.addEventListener("resize", updateHeaderHeight);
new ResizeObserver(updateHeaderHeight).observe(document.querySelector("header"));

// --- theme toggle ---
const THEME_KEY = "beast2026_theme_v1";
function applyTheme(t) {
  document.documentElement.setAttribute("data-theme", t);
  localStorage.setItem(THEME_KEY, t);
}
applyTheme(localStorage.getItem(THEME_KEY) || "dark");
document.getElementById("theme-btn").addEventListener("click", () => {
  const cur = document.documentElement.getAttribute("data-theme") || "dark";
  applyTheme(cur === "dark" ? "light" : "dark");
});

// --- init ---
renderTabs();
renderMain();
updateStats();
updateSaveStatus();
</script>
</body>
</html>
